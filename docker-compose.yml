services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: ai-git-trending-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    command:
      - python
      - app.py
      - --mode
      - full
      - --host
      - 0.0.0.0
      - --port
      - "5001"
    ports:
      - "5001:5001"
    volumes:
      - ./backend/output:/app/backend/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/api/stats', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: ai-git-trending-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
